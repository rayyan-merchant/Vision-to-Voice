# ============================================================
# Vision-to-Voice  |  Central Config  |  NEVER hardcode these
# ============================================================

dino:
  model_name: "dinov2_vits14"          # frozen backbone
  hub_repo:   "facebookresearch/dinov2"
  cls_dim:    384
  patch_dim:  384
  num_patches: 256                     # 16x16 patch grid
  img_size:   224

ai2thor:
  width:       224
  height:      224
  fov:         90
  scenes_train:
    - FloorPlan1
    - FloorPlan2
    - FloorPlan3
    - FloorPlan4
    - FloorPlan5
    - FloorPlan201
    - FloorPlan202
    - FloorPlan203
    - FloorPlan301
    - FloorPlan302
  actions:
    - MoveAhead
    - RotateLeft
    - RotateRight
    - LookUp
    - LookDown

trajectory:
  mock_samples:  50                    # Day 3 export for Syeda
  full_samples:  5000                  # Day 7 full dataset
  mock_path:     "data/trajectories/mock_trajectories.json"
  full_path:     "data/trajectories/all_trajectories.json"
  scene_switch_every: 500              # rotate scene every N samples

mapper:
  dedup_threshold:   0.5               # metres — nodes closer than this are merged
  frontier_max_deg:  3                 # nodes with degree < this are frontiers
  surprise_threshold: 0.25             # JEPA error above this triggers YOLOE

jepa:
  hidden_dim:  1024
  epochs:      100
  lr:          1e-3
  batch_size:  64
  loss_target: 0.15                    # training succeeds when loss < this
  model_path:  "models/jepa_predictor.pt"

scene_mlp:
  hidden1:     256
  hidden2:     64
  dropout:     0.3
  epochs:      60
  lr:          1e-3
  batch_size cde:  32
  accuracy_target: 0.75
  model_path:  "models/scene_mlp.pt"
  label_path:  "data/scene_labels/labels.json"

yoloe:
  model_variant: "yoloe-11s-seg.pt"   # small = fast; use 11l for accuracy
  conf_threshold: 0.5
  campus_classes:
    - person
    - door
    - sign
    - notice board
    - water cooler
    - stairs
    - wheelchair ramp
    - fire extinguisher
    - elevator
    - pillar

ocr:
  languages: ["en"]
  conf_threshold: 0.5
  min_text_len:   3

saliency:
  smoothgrad_samples: 50
  smoothgrad_stdevs:  0.15

narrator:
  narrate_every: 5                     # steps between voice announcements